# If you need to add a new message use a reasonable
# reserved ID. The higher ID the lower the priority. Generally
# - 0-13: Critical messages
# - 14-30: Actionable messages (trigger a change in another system)
# - 30-63: Data messages (usually not actionable by an onboard device)

---
Messages:
  rear_controller_status:
    id: 1
    cycle: "medium"
    critical: true
    target:
      telemetry:
        watchdog: 0
      front_controller:
        watchdog: 0
      steering:
        watchdog: 0
    signals:
      triggers:
        type: bitfield
        flags:
          - {name: bps_fault, length: 11}
          - {name: cell_at_fault, length: 8}
          - relay_state
          - {name: power_state, length: 2}
          - afe_status
          - motor_precharge_complete
        length: 32

  battery_stats_A:
    id: 2
    cycle: "medium"
    critical: true
    target:
      telemetry:
        watchdog: 0
      front_controller:
        watchdog: 0
      steering:
        watchdog: 0
    signals:
      pack_voltage:
        length: 16
      pack_current:
        length: 16
      pack_soc:
        length: 16

  battery_stats_B:
    id: 3
    cycle: "medium"
    critical: true
    target:
      telemetry:
        watchdog: 0
      front_controller:
        watchdog: 0
      steering:
        watchdog: 0
    signals:
      max_cell_voltage:
        length: 16
      min_cell_voltage:
        length: 16
      max_temperature:
        length: 16

  power_input_stats:
    id: 4
    cycle: "medium"
    critical: true
    target:
      telemetry:
        watchdog: 0
      steering:
        watchdog: 0
    signals:
      input_dcdc_voltage:
        length: 16
      input_dcdc_current:
        length: 16
      input_aux_voltage:
        length: 16
      input_aux_current:
        length: 16

  AFE_discharge_bitset:
    id: 50
    cycle: "medium"
    critical: false
    target:
      telemetry:
        watchdog: 0
      steering:
        watchdog: 0
    signals:
      AFE1:
        type: bitfield
        flags: [cell_0, cell_1, cell_2, cell_3, cell_4, cell_5, cell_6, cell_7, cell_8, cell_9, cell_10, cell_11, cell_12, cell_13, cell_14, cell_15]
        length: 32
      AFE2:
        type: bitfield
        flags: [cell_0, cell_1, cell_2, cell_3, cell_4, cell_5, cell_6, cell_7, cell_8, cell_9, cell_10, cell_11, cell_12, cell_13, cell_14, cell_15]
        length: 32

  AFE1_status_A:
    id: 51
    cycle: "medium"
    critical: false
    target:
      telemetry:
        watchdog: 0
      steering:
        watchdog: 0
    signals:
      id:
        length: 8
      voltage_0:
        length: 16
      voltage_1:
